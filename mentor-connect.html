<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orlyo — Payout Setup</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #97FF97; min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 24px; }
    .card { background: #fff; border-radius: 32px; padding: 48px 40px; max-width: 400px; width: 100%; }
    .icon { font-size: 48px; margin-bottom: 20px; }
    h1 { font-family: 'Cormorant Garamond', serif; font-size: 36px; font-weight: 700; color: #1B2833; margin-bottom: 12px; }
    p { font-size: 16px; font-weight: 300; color: #7F8C8D; line-height: 1.6; margin-bottom: 24px; }
    .btn { display: inline-block; background: #1B2833; color: #fff; padding: 14px 32px; border-radius: 99px; font-size: 15px; font-weight: 500; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✓</div>
    <h1>Payouts enabled!</h1>
    <p>Your Stripe account is connected. You can now accept paid session bookings through Orlyo. Return to the app to continue.</p>
    <a href="orlyo://mentor-connect?status=complete" class="btn">Return to Orlyo</a>
  </div>
</body>
</html>
